<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home Voice Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🎙️ Home Walkie-Talkie</h1>
        </header>

        <!-- Lobby View -->
        <main id="lobby" class="view active">
            <div class="card">
                <h2>Join a Room</h2>
                <div id="room-list" class="room-list">
                    <!-- Dynamic room items will go here -->
                </div>
                
                <div class="divider"><span>OR</span></div>
                
                <div class="create-room">
                    <input type="text" id="new-room-name" placeholder="Name your new room..." autocomplete="off">
                    <button id="create-room-btn" class="btn primary">Start New Room ✨</button>
                </div>
            </div>
        </main>

        <!-- Room View -->
        <main id="room" class="view">
            <div class="room-header">
                <button id="leave-room-btn" class="btn secondary small">⬅️ Leave</button>
                <h2 id="current-room-name">Room Name</h2>
                <button id="ping-btn" class="btn secondary small" title="Ring call alert to everyone">🔔 Ping</button>
            </div>

            <div class="room-settings panel">
                <div class="setting-item">
                    <label>🎙️ Audio Mode:</label>
                    <select id="mode-select" class="select-btn">
                        <option value="hands-free">Hands-Free (Always On)</option>
                        <option value="ptt">Push-To-Talk (Hold Space/Button)</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>📻 Transceiver Filter:</label>
                    <label class="switch">
                        <input type="checkbox" id="filter-checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            
            <div id="participants" class="participants-grid">
                <!-- Participants will be added here -->
            </div>

            <!-- Double control schemes (Normal Hands-Free Mute or massive tactile PTT pad) -->
            <div class="controls-area">
                <div id="handsfree-controls" class="controls-wrap active">
                    <button id="mute-btn" class="btn control-btn">
                        <span class="icon">🎤</span>
                        <span class="label">Mute</span>
                    </button>
                </div>
                
                <div id="ptt-controls" class="controls-wrap">
                    <button id="ptt-btn" class="btn ptt-btn">
                        <span class="ptt-icon">🎙️</span>
                        <span class="ptt-label">HOLD TO TALK</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden audio element for local mic test/feedback (optional) -->
    <audio id="local-audio" autoplay muted style="display:none;"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
